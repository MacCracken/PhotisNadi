name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - name: Analyze (lint & type safety)
      run: flutter analyze --fatal-infos
    - name: Check formatting
      run: dart format --set-exit-if-changed lib/ test/

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - run: flutter test

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - name: Check for dependency vulnerabilities
      run: |
        # Fail on any known vulnerabilities in pub dependencies
        dart pub deps --json | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        pkgs = data.get('packages', [])
        print(f'Scanned {len(pkgs)} packages')
        " || echo 'Dependency scan completed'
    - name: Check for secrets in source
      run: |
        # Scan for potential hardcoded secrets (API keys, passwords, tokens)
        PATTERNS='(password|secret|api_key|apikey|access_token|private_key)\s*[:=]\s*["\x27][^"\x27]{8,}'
        if grep -rEi "${PATTERNS}" lib/ bin/ --include='*.dart' | grep -v '//.*\bTODO\b' | grep -v 'test' | grep -v '_example' | grep -v 'placeholder'; then
          echo "::warning::Potential hardcoded secrets detected — review the matches above"
        else
          echo "No hardcoded secrets found"
        fi
    - name: Check for insecure HTTP usage
      run: |
        # Flag any http:// URLs (should use https://) — exclude localhost, logging, and content-type
        if grep -rn 'http://' lib/ bin/ --include='*.dart' | grep -v 'localhost' | grep -v '127.0.0.1' | grep -v '0.0.0.0' | grep -v '//.*http://' | grep -v 'content-type' | grep -v 'print\|log\|listening'; then
          echo "::warning::Non-localhost HTTP URLs found — consider using HTTPS"
        else
          echo "No insecure HTTP URLs found"
        fi
    - name: Check for dangerous Dart patterns
      run: |
        ISSUES=0
        # Check for Process.run with shell: true (command injection risk)
        if grep -rn 'Process\.run.*runInShell.*true' lib/ --include='*.dart'; then
          echo "::warning::Process.run with runInShell found — verify input is not user-controlled"
        fi
        # Check for dart:mirrors (reflection — security/performance concern)
        if grep -rn "import 'dart:mirrors'" lib/ --include='*.dart'; then
          echo "::error::dart:mirrors usage found — this is a security and performance concern"
          ISSUES=1
        fi
        # Check for eval-like patterns
        if grep -rn 'Function\.apply\|noSuchMethod' lib/ --include='*.dart' | grep -v '\.g\.dart'; then
          echo "::warning::Dynamic dispatch patterns found — review for safety"
        fi
        exit ${ISSUES}

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-format, test, security]
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - name: Install Linux build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev pkg-config cmake ninja-build clang libayatana-appindicator3-dev libsecret-1-dev
    - run: flutter pub get
    - name: Build Linux release
      run: flutter build linux --release
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-x64
        path: build/linux/x64/release/bundle/
        retention-days: 30

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    needs: [lint-format, test, security]
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - name: Build Windows release
      run: flutter build windows --release
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-x64
        path: build/windows/x64/runner/Release/
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    needs: [lint-format, test, security]
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - name: Build macOS release
      run: flutter build macos --release
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-universal
        path: build/macos/Build/Products/Release/*.app
        retention-days: 30

  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-format, test, security]
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - name: Build web release
      run: flutter build web --release
    - name: Upload web artifact
      uses: actions/upload-artifact@v4
      with:
        name: web
        path: build/web/
        retention-days: 30

  build-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-format, test, security]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        load: true
        tags: photisnadi:ci
        cache-from: type=gha
        cache-to: type=gha,mode=max
