name: Release

on:
  push:
    tags:
      - 'v[0-9][0-9][0-9][0-9].[0-9]*'
      - '[0-9][0-9][0-9][0-9].[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2026.3.9)'
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ci]
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_slug: ${{ steps.version.outputs.version_slug }}
    steps:
    - name: Determine version
      id: version
      env:
        INPUT_VERSION: ${{ github.event.inputs.version }}
      run: |
        if [ -n "${INPUT_VERSION}" ]; then
          VERSION="${INPUT_VERSION}"
        else
          VERSION="${GITHUB_REF_NAME#v}"
        fi
        # Validate version format (YYYY.M.D or YYYY.M.D-P)
        if ! echo "${VERSION}" | grep -qE '^[0-9]{4}\.[0-9]+\.[0-9]+(\-[0-9]+)?$'; then
          echo "::error::Invalid version format: ${VERSION}"
          exit 1
        fi
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        # Convert YYYY.M.D or YYYY.M.D-P → YYYYMMDD[P] for filenames
        IFS='.-' read -r Y M D P <<< "${VERSION}"
        SLUG="$(printf '%04d%02d%02d' "$Y" "$M" "$D")${P:+$P}"
        echo "version_slug=${SLUG}" >> "$GITHUB_OUTPUT"

  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [version]
    steps:
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.version.outputs.version }}
        name: Photis Nadi ${{ needs.version.outputs.version }}
        generate_release_notes: true
        draft: false

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [version, create-release]
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - name: Install Linux build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev pkg-config cmake ninja-build clang libayatana-appindicator3-dev libsecret-1-dev
    - run: flutter pub get
    - name: Build Linux release
      run: flutter build linux --release
    - name: Package Linux bundle
      env:
        VERSION_SLUG: ${{ needs.version.outputs.version_slug }}
      run: |
        tar -czf "photisnadi-${VERSION_SLUG}-linux-x64.tar.gz" \
          -C build/linux/x64/release bundle
    - name: Upload to release
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ needs.version.outputs.version }}
      run: gh release upload "${RELEASE_VERSION}" photisnadi-*-linux-x64.tar.gz --clobber

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    needs: [version, create-release]
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - name: Build Windows release
      run: flutter build windows --release
    - name: Package Windows bundle
      shell: pwsh
      env:
        VERSION_SLUG: ${{ needs.version.outputs.version_slug }}
      run: |
        Compress-Archive `
          -Path "build\windows\x64\runner\Release\*" `
          -DestinationPath "photisnadi-${env:VERSION_SLUG}-windows-x64.zip"
    - name: Upload to release
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ needs.version.outputs.version }}
      run: gh release upload "${RELEASE_VERSION}" photisnadi-*-windows-x64.zip --clobber

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    needs: [version, create-release]
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - name: Build macOS release
      run: flutter build macos --release
    - name: Package macOS app
      env:
        VERSION_SLUG: ${{ needs.version.outputs.version_slug }}
      run: |
        cd build/macos/Build/Products/Release
        zip -r "${GITHUB_WORKSPACE}/photisnadi-${VERSION_SLUG}-macos-universal.zip" *.app
    - name: Upload to release
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ needs.version.outputs.version }}
      run: gh release upload "${RELEASE_VERSION}" photisnadi-*-macos-universal.zip --clobber

  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [version, create-release]
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - name: Build web release
      run: flutter build web --release
    - name: Package web build
      env:
        VERSION_SLUG: ${{ needs.version.outputs.version_slug }}
      run: |
        tar -czf "photisnadi-${VERSION_SLUG}-web.tar.gz" -C build web
    - name: Upload to release
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ needs.version.outputs.version }}
      run: gh release upload "${RELEASE_VERSION}" photisnadi-*-web.tar.gz --clobber

  build-container:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [version]
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ needs.version.outputs.version }}
          type=raw,value=latest
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  checksums:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [version, build-linux, build-windows, build-macos, build-web]
    steps:
    - name: Download release assets
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ needs.version.outputs.version }}
      run: |
        gh release download "${RELEASE_VERSION}" \
          --repo "${{ github.repository }}" --dir assets
    - name: Generate and upload checksums
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ needs.version.outputs.version }}
      run: |
        cd assets
        sha256sum photisnadi-* > SHA256SUMS
        gh release upload "${RELEASE_VERSION}" SHA256SUMS --clobber \
          --repo "${{ github.repository }}"
