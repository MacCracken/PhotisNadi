name: Release

on:
  push:
    tags:
      - 'v[0-9][0-9][0-9][0-9].[0-9]*'
      - '[0-9][0-9][0-9][0-9].[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2026.3.9)'
        required: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  version:
    runs-on: ubuntu-latest
    needs: [ci]
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_slug: ${{ steps.version.outputs.version_slug }}
    steps:
    - name: Determine version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          VERSION="${GITHUB_REF_NAME#v}"
        fi
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        # Convert YYYY.M.D[.P] → YYYYMMDD[P] for filenames
        IFS='.' read -r Y M D P <<< "${VERSION}"
        SLUG="$(printf '%04d%02d%02d' "$Y" "$M" "$D")${P:+$P}"
        echo "version_slug=${SLUG}" >> "$GITHUB_OUTPUT"

  build-linux:
    runs-on: ubuntu-latest
    needs: [version]
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - name: Install Linux build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev pkg-config cmake ninja-build clang libayatana-appindicator3-dev
    - run: flutter pub get
    - name: Build Linux release
      run: flutter build linux --release
    - name: Package Linux bundle
      run: |
        VERSION="${{ needs.version.outputs.version_slug }}"
        tar -czf "photisnadi-${VERSION}-linux-x64.tar.gz" \
          -C build/linux/x64/release bundle
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-release
        path: photisnadi-*-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    needs: [version]
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - name: Build Windows release
      run: flutter build windows --release
    - name: Package Windows bundle
      shell: pwsh
      run: |
        $version = "${{ needs.version.outputs.version_slug }}"
        Compress-Archive `
          -Path "build\windows\x64\runner\Release\*" `
          -DestinationPath "photisnadi-${version}-windows-x64.zip"
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-release
        path: photisnadi-*-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    needs: [version]
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - name: Build macOS release
      run: flutter build macos --release
    - name: Package macOS app
      run: |
        VERSION="${{ needs.version.outputs.version_slug }}"
        cd build/macos/Build/Products/Release
        zip -r "${GITHUB_WORKSPACE}/photisnadi-${VERSION}-macos-universal.zip" *.app
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-release
        path: photisnadi-*-macos-universal.zip

  build-web:
    runs-on: ubuntu-latest
    needs: [version]
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - name: Build web release
      run: flutter build web --release
    - name: Package web build
      run: |
        VERSION="${{ needs.version.outputs.version_slug }}"
        tar -czf "photisnadi-${VERSION}-web.tar.gz" -C build web
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-release
        path: photisnadi-*-web.tar.gz

  build-container:
    runs-on: ubuntu-latest
    needs: [version]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ needs.version.outputs.version }}
          type=raw,value=latest
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: [version, build-linux, build-windows, build-macos, build-web, build-container]
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets
        merge-multiple: true

    - name: Generate checksums
      run: |
        cd release-assets
        sha256sum photisnadi-* > SHA256SUMS

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.version.outputs.version }}
        name: Photis Nadi ${{ needs.version.outputs.version }}
        generate_release_notes: true
        files: |
          release-assets/photisnadi-*
          release-assets/SHA256SUMS
