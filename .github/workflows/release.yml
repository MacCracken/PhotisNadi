name: Release

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9].[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2026.2.16)'
        required: true

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    runs-on: ubuntu-latest
    needs: [ci]
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4

    - name: Determine version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
        else
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
        fi

    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Linux build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev pkg-config cmake ninja-build clang

    - run: flutter pub get

    - name: Build Linux release
      run: flutter build linux --release

    - name: Package binary bundle
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        BUNDLE_DIR="build/linux/x64/release/bundle"
        ARCHIVE="photisnadi-${VERSION}-linux-x64.tar.gz"

        tar -czf "${ARCHIVE}" -C "$(dirname ${BUNDLE_DIR})" "$(basename ${BUNDLE_DIR})"
        sha256sum "${ARCHIVE}" > SHA256SUMS

        echo "archive=${ARCHIVE}" >> "$GITHUB_ENV"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-release
        path: |
          photisnadi-*.tar.gz
          SHA256SUMS

  release:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: linux-release

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.build.outputs.version }}
        name: Photis Nadi ${{ needs.build.outputs.version }}
        generate_release_notes: true
        files: |
          photisnadi-*.tar.gz
          SHA256SUMS
