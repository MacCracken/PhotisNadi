name: Release

on:
  push:
    tags:
      - 'v[0-9][0-9][0-9][0-9].[0-9]*'
      - '[0-9][0-9][0-9][0-9].[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2026.3.9)'
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ci]
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_slug: ${{ steps.version.outputs.version_slug }}
    steps:
    - uses: actions/checkout@v4
      with:
        sparse-checkout: VERSION
        sparse-checkout-cone-mode: false
    - name: Determine version
      id: version
      env:
        INPUT_VERSION: ${{ github.event.inputs.version }}
      run: |
        if [ -n "${INPUT_VERSION}" ]; then
          VERSION="${INPUT_VERSION}"
        elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
          VERSION="${GITHUB_REF_NAME#v}"
        else
          VERSION="$(tr -d '[:space:]' < VERSION)"
        fi
        # Validate version format (YYYY.M.D or YYYY.M.D-P)
        if ! echo "${VERSION}" | grep -qE '^[0-9]{4}\.[0-9]+\.[0-9]+(\-[0-9]+)?$'; then
          echo "::error::Invalid version format: ${VERSION}"
          exit 1
        fi
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        # Convert YYYY.M.D or YYYY.M.D-P → YYYYMMDD[P] for filenames
        IFS='.-' read -r Y M D P <<< "${VERSION}"
        SLUG="$(printf '%04d%02d%02d' "$Y" "$M" "$D")${P:+$P}"
        echo "version_slug=${SLUG}" >> "$GITHUB_OUTPUT"

  create-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [version]
    steps:
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.version.outputs.version }}
        name: Photis Nadi ${{ needs.version.outputs.version }}
        generate_release_notes: true
        draft: false

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ci, version, create-release]
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: linux-x64
        path: bundle
    - name: Package Linux bundle
      env:
        VERSION_SLUG: ${{ needs.version.outputs.version_slug }}
      run: |
        tar -czf "photisnadi-${VERSION_SLUG}-linux-x64.tar.gz" bundle
    - name: Upload to release
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ needs.version.outputs.version }}
      run: gh release upload "${RELEASE_VERSION}" photisnadi-*-linux-x64.tar.gz --clobber --repo "${{ github.repository }}"

  build-windows:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ci, version, create-release]
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: windows-x64
        path: windows-release
    - name: Package Windows bundle
      env:
        VERSION_SLUG: ${{ needs.version.outputs.version_slug }}
      run: |
        cd windows-release
        zip -r "${GITHUB_WORKSPACE}/photisnadi-${VERSION_SLUG}-windows-x64.zip" .
    - name: Upload to release
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ needs.version.outputs.version }}
      run: gh release upload "${RELEASE_VERSION}" photisnadi-*-windows-x64.zip --clobber --repo "${{ github.repository }}"

  build-macos:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ci, version, create-release]
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: macos-universal
        path: macos-release
    - name: Package macOS app
      env:
        VERSION_SLUG: ${{ needs.version.outputs.version_slug }}
      run: |
        cd macos-release
        zip -r "${GITHUB_WORKSPACE}/photisnadi-${VERSION_SLUG}-macos-universal.zip" *.app
    - name: Upload to release
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ needs.version.outputs.version }}
      run: gh release upload "${RELEASE_VERSION}" photisnadi-*-macos-universal.zip --clobber --repo "${{ github.repository }}"

  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ci, version, create-release]
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: web
        path: web
    - name: Package web build
      env:
        VERSION_SLUG: ${{ needs.version.outputs.version_slug }}
      run: |
        tar -czf "photisnadi-${VERSION_SLUG}-web.tar.gz" web
    - name: Upload to release
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ needs.version.outputs.version }}
      run: gh release upload "${RELEASE_VERSION}" photisnadi-*-web.tar.gz --clobber --repo "${{ github.repository }}"

  build-container:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [version]
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ needs.version.outputs.version }}
          type=raw,value=latest
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  checksums:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [version, build-linux, build-windows, build-macos, build-web]
    steps:
    - name: Download release assets
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ needs.version.outputs.version }}
      run: |
        gh release download "${RELEASE_VERSION}" \
          --repo "${{ github.repository }}" --dir assets
    - name: Generate and upload checksums
      env:
        GH_TOKEN: ${{ github.token }}
        RELEASE_VERSION: ${{ needs.version.outputs.version }}
      run: |
        cd assets
        sha256sum photisnadi-* > SHA256SUMS
        gh release upload "${RELEASE_VERSION}" SHA256SUMS --clobber \
          --repo "${{ github.repository }}"
