services:
  photisnadi:
    build:
      context: .
      dockerfile: Dockerfile
    image: photisnadi:latest
    container_name: photisnadi
    ports:
      - "${PORT:-8080}:8080"
      - "${API_PORT:-8081}:8081"
    environment:
      - PORT=8080
      - PHOTISNADI_API_KEY=${PHOTISNADI_API_KEY:-}
      - PHOTISNADI_API_PORT=8081
      - PHOTISNADI_DATA_DIR=/opt/photisnadi/data
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    volumes:
      - photisnadi-data:/opt/photisnadi/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  photisnadi-data:
