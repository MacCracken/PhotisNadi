services:
  photisnadi:
    build:
      context: .
      dockerfile: Dockerfile
    image: photisnadi:latest
    container_name: photisnadi
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=8080
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
